<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GuardAI – Content Moderation</title>
  <meta name="description" content="AI-powered real-time content moderation system using NLP and machine learning to flag toxic, obscene, threatening, and hateful text." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <style>
    /* ── Reset & Tokens ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-deep:      #050810;
      --bg-card:      rgba(15, 20, 40, 0.85);
      --bg-input:     rgba(255,255,255,.04);
      --border:       rgba(255,255,255,.08);
      --border-hover: rgba(255,255,255,.18);
      --text-primary: #f0f4ff;
      --text-muted:   #8694b4;
      --accent-1:     #6366f1;
      --accent-2:     #8b5cf6;
      --accent-glow:  rgba(99,102,241,.35);
      --safe-color:   #22c55e;
      --danger-color: #ef4444;
      --radius:       16px;
      --radius-sm:    10px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-deep);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Animated background orbs ──────────────────────────────────── */
    .bg-orbs {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      overflow: hidden;
    }
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: .18;
      animation: drift 20s ease-in-out infinite alternate;
    }
    .orb-1 { width: 600px; height: 600px; background: #6366f1; top: -200px; left: -200px; animation-duration: 22s; }
    .orb-2 { width: 500px; height: 500px; background: #8b5cf6; bottom: -150px; right: -150px; animation-duration: 18s; animation-delay: -8s; }
    .orb-3 { width: 350px; height: 350px; background: #ec4899; top: 40%; left: 50%; transform: translate(-50%,-50%); animation-duration: 25s; animation-delay: -4s; }

    @keyframes drift {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(40px, 30px) scale(1.08); }
    }

    /* ── Layout ─────────────────────────────────────────────────────── */
    .container {
      position: relative; z-index: 1;
      max-width: 820px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    /* ── Header ─────────────────────────────────────────────────────── */
    header { text-align: center; margin-bottom: 48px; }

    .logo-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(99,102,241,.15);
      border: 1px solid rgba(99,102,241,.35);
      border-radius: 50px;
      padding: 6px 18px;
      font-size: .78rem; font-weight: 600; letter-spacing: .08em;
      color: #a5b4fc;
      margin-bottom: 24px;
      animation: fadeDown .6s ease both;
    }
    .logo-badge span { font-size: 1rem; }

    .brand { font-size: clamp(2.2rem, 6vw, 3.6rem); font-weight: 900; line-height: 1.1; animation: fadeDown .7s ease .05s both; }
    .brand-guard { color: var(--text-primary); }
    .brand-ai {
      background: linear-gradient(120deg, var(--accent-1), var(--accent-2), #ec4899);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    .tagline {
      margin-top: 14px;
      font-size: 1.05rem; color: var(--text-muted); font-weight: 400;
      animation: fadeDown .7s ease .1s both;
    }

    /* ── Card ───────────────────────────────────────────────────────── */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: 0 8px 48px rgba(0,0,0,.5);
      animation: fadeUp .7s ease .15s both;
    }

    /* ── Textarea ───────────────────────────────────────────────────── */
    .input-label {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
      font-size: .8rem; font-weight: 600; letter-spacing: .06em; color: var(--text-muted);
      text-transform: uppercase;
    }
    #char-count { font-variant-numeric: tabular-nums; transition: color .2s; }

    textarea#text-input {
      width: 100%;
      min-height: 150px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-family: inherit; font-size: 1rem; line-height: 1.6;
      padding: 16px;
      resize: vertical;
      outline: none;
      transition: border-color .25s, box-shadow .25s;
    }
    textarea#text-input::placeholder { color: #3d4f72; }
    textarea#text-input:focus {
      border-color: var(--accent-1);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    /* ── Button ─────────────────────────────────────────────────────── */
    .btn-row { display: flex; gap: 12px; margin-top: 16px; }

    #analyze-btn {
      flex: 1;
      padding: 14px 28px;
      font-family: inherit; font-size: 1rem; font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
      border: none; border-radius: var(--radius-sm);
      cursor: pointer;
      position: relative; overflow: hidden;
      transition: transform .15s, box-shadow .2s;
    }
    #analyze-btn::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,.15), transparent);
      opacity: 0; transition: opacity .2s;
    }
    #analyze-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px var(--accent-glow); }
    #analyze-btn:hover::before { opacity: 1; }
    #analyze-btn:active { transform: translateY(0); }
    #analyze-btn:disabled { opacity: .55; cursor: not-allowed; transform: none; box-shadow: none; }

    #clear-btn {
      padding: 14px 20px;
      font-family: inherit; font-size: .9rem; font-weight: 600;
      color: var(--text-muted);
      background: rgba(255,255,255,.05);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background .2s, color .2s, border-color .2s;
    }
    #clear-btn:hover { background: rgba(255,255,255,.1); color: var(--text-primary); border-color: var(--border-hover); }

    /* loader spinner inside button */
    .btn-inner { display: flex; align-items: center; justify-content: center; gap: 10px; }
    .spinner {
      display: none;
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    /* ── Result panel ────────────────────────────────────────────────── */
    #result-panel {
      margin-top: 28px;
      display: none;
      animation: fadeUp .5s ease both;
    }

    /* Overall verdict banner */
    .verdict-banner {
      display: flex; align-items: center; gap: 16px;
      border-radius: var(--radius-sm);
      padding: 18px 22px;
      margin-bottom: 24px;
      border: 1px solid transparent;
    }
    .verdict-banner.safe {
      background: rgba(34,197,94,.1);
      border-color: rgba(34,197,94,.3);
    }
    .verdict-banner.unsafe {
      background: rgba(239,68,68,.1);
      border-color: rgba(239,68,68,.3);
    }
    .verdict-icon {
      font-size: 2.2rem; line-height: 1;
      animation: popIn .4s cubic-bezier(.34,1.56,.64,1) both;
    }
    .verdict-text h2 { font-size: 1.15rem; font-weight: 800; }
    .verdict-text p  { font-size: .85rem; color: var(--text-muted); margin-top: 2px; }
    .verdict-banner.safe .verdict-text h2  { color: var(--safe-color); }
    .verdict-banner.unsafe .verdict-text h2 { color: var(--danger-color); }

    /* Score ring */
    .score-ring-wrap {
      margin-left: auto;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
    }
    .score-ring-wrap span { font-size: .7rem; color: var(--text-muted); font-weight: 600; letter-spacing: .05em; text-transform: uppercase; }
    .ring-svg { transform: rotate(-90deg); }
    .ring-track { fill: none; stroke: rgba(255,255,255,.08); stroke-width: 5; }
    .ring-fill  { fill: none; stroke-width: 5; stroke-linecap: round; transition: stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1), stroke .3s; }

    /* Category grid */
    .categories-title {
      font-size: .78rem; font-weight: 700; letter-spacing: .08em;
      text-transform: uppercase; color: var(--text-muted);
      margin-bottom: 12px;
    }
    .categories-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
    }

    .category-card {
      background: rgba(255,255,255,.03);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      transition: border-color .2s, transform .2s;
    }
    .category-card:hover { border-color: var(--border-hover); transform: translateY(-2px); }
    .category-card.flagged {
      background: rgba(239,68,68,.07);
      border-color: rgba(239,68,68,.35);
    }

    .cat-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px;
    }
    .cat-label {
      display: flex; align-items: center; gap: 8px;
      font-size: .88rem; font-weight: 600;
    }
    .cat-emoji { font-size: 1.1rem; }
    .cat-pill {
      font-size: .68rem; font-weight: 700; letter-spacing: .06em;
      padding: 2px 8px; border-radius: 50px;
      text-transform: uppercase;
    }
    .cat-pill.flagged { background: rgba(239,68,68,.25); color: #f87171; }
    .cat-pill.clean   { background: rgba(34,197,94,.15);  color: #4ade80; }

    .cat-bar-track {
      background: rgba(255,255,255,.07);
      border-radius: 50px; height: 5px; overflow: hidden;
    }
    .cat-bar-fill {
      height: 100%; border-radius: 50px;
      width: 0%;
      transition: width 1s cubic-bezier(.4,0,.2,1);
    }
    .cat-prob {
      font-size: .78rem; color: var(--text-muted); margin-top: 6px;
      font-variant-numeric: tabular-nums;
    }

    /* ── Error box ───────────────────────────────────────────────────── */
    .error-box {
      margin-top: 16px;
      background: rgba(239,68,68,.1);
      border: 1px solid rgba(239,68,68,.3);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      font-size: .88rem; color: #f87171;
      display: none;
    }

    /* ── Footer ─────────────────────────────────────────────────────── */
    footer {
      text-align: center; margin-top: 60px;
      font-size: .78rem; color: var(--text-muted);
      position: relative; z-index: 1;
    }
    footer a { color: #818cf8; text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    /* ── Keyframes ───────────────────────────────────────────────────── */
    @keyframes fadeDown { from { opacity:0; transform: translateY(-18px); } to { opacity:1; transform: translateY(0); } }
    @keyframes fadeUp   { from { opacity:0; transform: translateY(18px);  } to { opacity:1; transform: translateY(0); } }
    @keyframes popIn    { from { opacity:0; transform: scale(.5);         } to { opacity:1; transform: scale(1);   } }
    @keyframes spin     { to   { transform: rotate(360deg); } }

    /* ── Responsive ─────────────────────────────────────────────────── */
    @media (max-width: 540px) {
      .card { padding: 22px 18px; }
      .categories-grid { grid-template-columns: 1fr 1fr; }
      .verdict-banner { flex-wrap: wrap; }
      .score-ring-wrap { margin-left: 0; }
    }
  </style>
</head>

<body>
  <!-- Ambient background -->
  <div class="bg-orbs" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="container">

    <!-- ── Header ── -->
    <header>
      <div class="logo-badge"><span>🛡️</span> AI Content Moderation</div>
      <h1 class="brand">
        <span class="brand-guard">Guard</span><span class="brand-ai">AI</span>
      </h1>
      <p class="tagline">Real-time toxicity detection powered by TF-IDF + Logistic Regression ML</p>
    </header>

    <!-- ── Input Card ── -->
    <section class="card" aria-label="Text input for analysis">

      <div class="input-label">
        <span>Paste or type text to analyse</span>
        <span id="char-count">0 / 5000</span>
      </div>

      <textarea
        id="text-input"
        placeholder="Type or paste any text here and click Analyse…"
        maxlength="5000"
        aria-label="Content to moderate"
        spellcheck="false"
      ></textarea>

      <div class="btn-row">
        <button id="analyze-btn" type="button" aria-live="polite">
          <div class="btn-inner">
            <div class="spinner" id="spinner" aria-hidden="true"></div>
            <span id="btn-label">✦ Analyse Content</span>
          </div>
        </button>
        <button id="clear-btn" type="button" title="Clear input and results">✕ Clear</button>
      </div>

      <!-- Error box -->
      <div class="error-box" id="error-box" role="alert" aria-live="assertive"></div>

      <!-- ── Results ── -->
      <div id="result-panel" aria-live="polite" aria-label="Analysis results">

        <!-- Verdict banner -->
        <div class="verdict-banner" id="verdict-banner">
          <div class="verdict-icon" id="verdict-icon"></div>
          <div class="verdict-text">
            <h2 id="verdict-title"></h2>
            <p  id="verdict-sub"></p>
          </div>
          <!-- SVG Ring Score -->
          <div class="score-ring-wrap">
            <svg class="ring-svg" id="ring-svg" width="60" height="60" viewBox="0 0 60 60" aria-label="Risk score ring">
              <circle class="ring-track" cx="30" cy="30" r="25" />
              <circle class="ring-fill"  cx="30" cy="30" r="25" id="ring-fill" />
            </svg>
            <span id="ring-pct">0%</span>
            <span>risk</span>
          </div>
        </div>

        <!-- Category cards -->
        <p class="categories-title">Category breakdown</p>
        <div class="categories-grid" id="categories-grid"></div>

      </div>
    </section>

    <footer>
      Powered by scikit-learn &amp; deployed on <a href="https://vercel.com" target="_blank" rel="noopener">Vercel</a> &nbsp;·&nbsp;
      Model: Logistic Regression (One-Vs-Rest, TF-IDF 10 k features) &nbsp;·&nbsp;
      <span id="inference-time"></span>
    </footer>

  </div><!-- /.container -->

  <script>
  (() => {
    "use strict";

    /* ── Config ─────────────────────────────────────────────────────── */
    const API_ENDPOINT = "/api/predict";

    const CIRCUMFERENCE = 2 * Math.PI * 25;   // ring radius = 25

    /* ── DOM refs ────────────────────────────────────────────────────── */
    const textInput    = document.getElementById("text-input");
    const charCount    = document.getElementById("char-count");
    const analyzeBtn   = document.getElementById("analyze-btn");
    const clearBtn     = document.getElementById("clear-btn");
    const spinner      = document.getElementById("spinner");
    const btnLabel     = document.getElementById("btn-label");
    const errorBox     = document.getElementById("error-box");
    const resultPanel  = document.getElementById("result-panel");
    const verdictBanner= document.getElementById("verdict-banner");
    const verdictIcon  = document.getElementById("verdict-icon");
    const verdictTitle = document.getElementById("verdict-title");
    const verdictSub   = document.getElementById("verdict-sub");
    const ringFill     = document.getElementById("ring-fill");
    const ringPct      = document.getElementById("ring-pct");
    const categoriesGrid = document.getElementById("categories-grid");
    const inferenceTime  = document.getElementById("inference-time");

    /* ── Initialise ring ─────────────────────────────────────────────── */
    ringFill.style.strokeDasharray  = CIRCUMFERENCE;
    ringFill.style.strokeDashoffset = CIRCUMFERENCE;

    /* ── Char counter ────────────────────────────────────────────────── */
    textInput.addEventListener("input", () => {
      const len = textInput.value.length;
      charCount.textContent = `${len} / 5000`;
      charCount.style.color = len > 4500 ? "#f97316" : "";
    });

    /* ── Keyboard shortcut: Ctrl/Cmd + Enter ─────────────────────────── */
    textInput.addEventListener("keydown", e => {
      if ((e.ctrlKey || e.metaKey) && e.key === "Enter") analyzeContent();
    });

    analyzeBtn.addEventListener("click", analyzeContent);
    clearBtn.addEventListener("click", clearAll);

    /* ── clearAll ────────────────────────────────────────────────────── */
    function clearAll() {
      textInput.value = "";
      charCount.textContent = "0 / 5000";
      charCount.style.color = "";
      resultPanel.style.display  = "none";
      errorBox.style.display     = "none";
      inferenceTime.textContent  = "";
    }

    /* ── setLoading ──────────────────────────────────────────────────── */
    function setLoading(on) {
      analyzeBtn.disabled     = on;
      spinner.style.display   = on ? "block" : "none";
      btnLabel.textContent    = on ? "Analysing…" : "✦ Analyse Content";
    }

    /* ── showError ───────────────────────────────────────────────────── */
    function showError(msg) {
      errorBox.textContent    = `⚠  ${msg}`;
      errorBox.style.display  = "block";
      resultPanel.style.display = "none";
    }

    /* ── analyzeContent ──────────────────────────────────────────────── */
    async function analyzeContent() {
      const text = textInput.value.trim();
      if (!text) { showError("Please enter some text before analysing."); return; }

      errorBox.style.display  = "none";
      setLoading(true);
      const t0 = performance.now();

      try {
        const resp = await fetch(API_ENDPOINT, {
          method:  "POST",
          headers: { "Content-Type": "application/json" },
          body:    JSON.stringify({ text }),
        });

        const data = await resp.json();
        if (!resp.ok) throw new Error(data.error || `HTTP ${resp.status}`);

        const elapsed = ((performance.now() - t0) / 1000).toFixed(2);
        renderResults(data, elapsed);

      } catch (err) {
        showError(err.message || "Unexpected error. Make sure the API is reachable.");
      } finally {
        setLoading(false);
      }
    }

    /* ── renderResults ────────────────────────────────────────────────── */
    function renderResults(data, elapsed) {
      /* Verdict banner */
      const safe = data.is_safe;
      verdictBanner.className = `verdict-banner ${safe ? "safe" : "unsafe"}`;
      verdictIcon.textContent  = safe ? "✅" : "🚨";
      verdictTitle.textContent = safe ? "Content is Clean" : "Toxic Content Detected";

      const flagCount = Object.values(data.details).filter(d => d.flag).length;
      verdictSub.textContent = safe
        ? "No harmful content categories were detected."
        : `${flagCount} of 6 categories flagged by the model.`;

      /* Ring animation */
      const pct = data.overall_score;
      const offset = CIRCUMFERENCE - (pct / 100) * CIRCUMFERENCE;
      ringFill.style.strokeDashoffset = offset;
      ringFill.style.stroke = safe ? "#22c55e" : pct > 70 ? "#ef4444" : "#f97316";
      ringPct.textContent   = `${pct.toFixed(0)}%`;

      /* Category cards */
      categoriesGrid.innerHTML = "";
      Object.entries(data.details).forEach(([label, d], i) => {
        const card = document.createElement("div");
        card.className = `category-card${d.flag ? " flagged" : ""}`;
        card.style.animationDelay = `${i * 60}ms`;

        const prettyLabel = label.replace("_", " ").replace(/\b\w/g, c => c.toUpperCase());

        card.innerHTML = `
          <div class="cat-header">
            <span class="cat-label">
              <span class="cat-emoji">${d.emoji}</span>
              ${prettyLabel}
            </span>
            <span class="cat-pill ${d.flag ? "flagged" : "clean"}">${d.flag ? "FLAGGED" : "CLEAN"}</span>
          </div>
          <div class="cat-bar-track">
            <div class="cat-bar-fill" data-pct="${d.probability}" style="background: ${d.color};"></div>
          </div>
          <div class="cat-prob">${d.probability.toFixed(1)}% confidence</div>
        `;
        categoriesGrid.appendChild(card);
      });

      /* Animate progress bars after DOM insert */
      requestAnimationFrame(() => {
        categoriesGrid.querySelectorAll(".cat-bar-fill").forEach(bar => {
          bar.style.width = `${bar.dataset.pct}%`;
        });
      });

      /* Inference time */
      inferenceTime.textContent = `⚡ ${elapsed}s inference time`;

      /* Show panel */
      resultPanel.style.display = "block";
      resultPanel.scrollIntoView({ behavior: "smooth", block: "nearest" });
    }

  })();
  </script>
</body>
</html>
